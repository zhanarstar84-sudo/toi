<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Талгат - 50 лет</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow-x: hidden; }
        .wrapper { position: relative; width: 100%; max-width: 500px; margin: 0 auto; height: 100vh; background: url('макет.jpg') no-repeat center center; background-size: cover; }
        
        /* Кнопка музыки */
        .music-btn { position: absolute; top: 20px; right: 20px; background: rgba(212,175,55,0.3); border: 1px solid #d4af37; border-radius: 50%; width: 45px; height: 45px; color: #d4af37; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        
        /* Таймер - ставим его над цифрой 50 */
        .timer-box { position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center; color: #fff; }
        .countdown { display: flex; justify-content: center; gap: 15px; }
        .unit { font-size: 0.7em; text-transform: uppercase; color: #d4af37; }
        .num { font-size: 2em; font-weight: bold; display: block; }

        /* Невидимая кнопка WhatsApp поверх "ҚАТЫСУЫҢЫЗДЫ РАСТАУ" */
        .wa-link { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); width: 80%; height: 60px; cursor: pointer; }
    </style>
</head>
<body>
    <audio id="m" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <div class="wrapper">
        <button class="music-btn" onclick="let a=document.getElementById('m'); a.paused?a.play():a.pause()">♪</button>
        
        <div class="timer-box">
            <div style="font-size: 0.8em; margin-bottom: 5px; color: #d4af37;">ДО ТОЯ ОСТАЛОСЬ:</div>
            <div class="countdown">
                <div><span class="num" id="d">00</span><span class="unit">дн</span></div>
                <div><span class="num" id="h">00</span><span class="unit">час</span></div>
                <div><span class="num" id="m1">00</span><span class="unit">мин</span></div>
                <div><span class="num" id="s">00</span><span class="unit">сек</span></div>
            </div>
        </div>

        <a href="https://wa.me/77081489816?text=Приглашение%20принято!%20Будем." class="wa-link"></a>
    </div>

    <script>
        function update() {
            const t = new Date("June 14, 2026 18:30:00").getTime() - new Date().getTime();
            document.getElementById("d").innerText = Math.floor(t/(1000*60*60*24));
            document.getElementById("h").innerText = Math.floor((t%(1000*60*60*24))/(1000*60*60));
            document.getElementById("m1").innerText = Math.floor((t%(1000*60*60))/(1000*60));
            document.getElementById("s").innerText = Math.floor((t%(1000*60))/1000);
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
