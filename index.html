<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Талғат 50 жас</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --cream: #fdf5e6; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Comfortaa', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; box-sizing: border-box; text-align: center; }

        /* ЭКРАН 1: ФОТО С ТЕКСТОМ ВНУТРИ */
        #hero { 
            background: #000 url('main.jpg') no-repeat center center; 
            background-size: cover; 
        }

        .scroll-arrow { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 10; cursor: pointer; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);} 40% {transform: translateY(-10px) translateX(-50%);} }

        .controls { position: fixed; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; }
        .lang-btns button, .music-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--gold); color: #fff; padding: 8px 12px; cursor: pointer; border-radius: 5px; font-size: 12px; }

        #details { background: var(--cream); color: #333; }
        .calendar { border: 2px solid var(--gold); padding: 15px; border-radius: 12px; background: #fff; color: #000; margin: 20px auto; width: 280px; }
        .highlight { background: var(--gold); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; }
        .btn-gold { background: linear-gradient(45deg, #d4af37, #f9f0b5); color: #000; padding: 16px; border-radius: 30px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; width: 85%; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="lang-btns">
            <button onclick="changeLang('kz')">ҚАЗ</button>
            <button onclick="changeLang('ru')">РУС</button>
        </div>
        <button class="music-btn" onclick="toggleMusic()">♪ Музыка</button>
    </div>

    <section id="hero">
        <div class="scroll-arrow" onclick="document.getElementById('details').scrollIntoView();">
            <svg viewBox="0 0 24 24" width="35" height="35" fill="none" stroke="#d4af37" stroke-width="3"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
        </div>
    </section>

    <section id="details">
        <h2 id="m-invite">Құрметті қонақтар!</h2>
        <p id="m-text">Сіздерді Талғаттың мерейтойына арналған салтанатты дастарханымыздың қадірлі қонағы болуға шақырамыз!</p>
        <div class="scroll-arrow" onclick="document.getElementById('info').scrollIntoView();">
            <svg viewBox="0 0 24 24" width="35" height="35" fill="none" stroke="#8e6f3e" stroke-width="3"><path d="M7 13l5 5 5-5"/></svg>
        </div>
    </section>

    <section id="info" style="padding-bottom: 80px;">
        <h2 id="m-when" style="color: var(--gold);">Қашан және қайда?</h2>
        <div class="calendar">
            <div id="m-month" style="font-weight:bold; color:var(--gold);">МАУСЫМ 2026</div>
            <table style="width:100%; text-align:center;">
                <tr style="color:#888; font-size:12px;"><td>Дс</td><td>Сс</td><td>Ср</td><td>Бс</td><td>Жм</td><td>Сб</td><td style="color:red">Жс</td></tr>
                <tr><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td style="color:red">7</td></tr>
                <tr><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td><td>13</td><td><span class="highlight">14</span></td></tr>
            </table>
        </div>
        <p id="m-addr"><b>"Хан Талапай" мейрамханасы</b><br>Астана қ., Қорғалжын тас жолы, 20</p>
        <a href="https://2gis.kz/astana" target="_blank" class="btn-gold">2GIS КАРТА</a>
        <button class="btn-gold" style="margin-top:20px;" onclick="sendWA('Келемін')">Келемін</button>
        <button class="btn-gold" style="background:#444; color:#fff;" onclick="sendWA('Келе алмаймын')">Келе алмаймын</button>
    </section>

    <audio id="bgMusic" loop><source src="музыка.mp3" type="audio/mpeg"></audio>

    <script>
        const music = document.getElementById('bgMusic');
        function toggleMusic() { music.paused ? music.play() : music.pause(); }
        function sendWA(ans) { window.location.href = `https://wa.me/77081489816?text=${encodeURIComponent("Жауабым: " + ans)}`; }
        function changeLang(l) {
            const t = {
                ru: { invite: "Дорогие гости!", text: "Приглашаем вас на торжество в честь 50-летия Талгата!", when: "Когда и где?" },
                kz: { invite: "Құрметті қонақтар!", text: "Сіздерді Талғаттың мерейтойына арналған салтанатты дастарханымызға шақырамыз!", when: "Қашан және қайда?" }
            };
            document.getElementById('m-invite').innerText = t[l].invite;
            document.getElementById('m-text').innerText = t[l].text;
            document.getElementById('m-when').innerText = t[l].when;
        }
    </script>
</body>
</html>
