<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Талгат - 50 лет</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: Arial, sans-serif; }
        .wrapper { position: relative; width: 100%; max-width: 500px; margin: 0 auto; height: 100vh; background: url('макет.jpg') no-repeat center center; background-size: cover; }
        .music-btn { position: absolute; top: 20px; right: 20px; background: rgba(212,175,55,0.4); border: 1px solid #d4af37; border-radius: 50%; width: 45px; height: 45px; color: #d4af37; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20; }
        .lang-btns { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 20; }
        .lang-btns button { background: rgba(0,0,0,0.6); border: 1px solid #d4af37; color: #fff; padding: 6px 12px; cursor: pointer; border-radius: 5px; font-size: 12px; }
        .info-box { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 90%; text-align: center; color: #fff; text-shadow: 2px 2px 5px #000; }
        .info-box h2 { font-size: 22px; margin: 5px 0; color: #d4af37; }
        .timer-box { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); width: 100%; text-align: center; color: #fff; }
        .countdown { display: flex; justify-content: center; gap: 10px; }
        .time-item { background: rgba(0,0,0,0.6); padding: 8px; border-radius: 5px; min-width: 45px; }
        .time-num { font-size: 24px; font-weight: bold; display: block; }
        .time-text { font-size: 10px; color: #d4af37; }
        .wa-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: linear-gradient(45deg, #d4af37, #f9f0b5); padding: 14px; text-align: center; border-radius: 30px; text-decoration: none; color: #000; font-weight: bold; font-size: 14px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="lang-btns">
            <button onclick="changeLang('kz')">ҚАЗ</button>
            <button onclick="changeLang('ru')">РУС</button>
        </div>
        <div class="music-btn" onclick="toggleMusic()">♪</div>
        <div class="info-box">
            <h2 id="date-text">14 МАУСЫМ, 16:00</h2>
            <p id="address-text">Қорғалжын тас жолы</p>
        </div>
        <div class="timer-box">
            <div id="t-title" style="color:#d4af37; font-size:12px; margin-bottom:10px;">ТОЙҒА ДЕЙІН ҚАЛДЫ:</div>
            <div class="countdown">
                <div class="time-item"><span class="time-num" id="days">00</span><span id="t-d" class="time-text">күн</span></div>
                <div class="time-item"><span class="time-num" id="hours">00</span><span id="t-h" class="time-text">сағат</span></div>
                <div class="time-item"><span class="time-num" id="mins">00</span><span id="t-m" class="time-text">мин</span></div>
                <div class="time-item"><span class="time-num" id="secs">00</span><span id="t-s" class="time-text">сек</span></div>
            </div>
        </div>
        <a href="https://wa.me/77015201111" class="wa-btn" id="wa-text">ҚАТЫСУЫҢЫЗДЫ РАСТАУ</a>
    </div>
    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <script>
        const music = document.getElementById('bgMusic');
        function toggleMusic() { music.paused ? music.play() : music.pause(); }
        function changeLang(lang) {
            const t = {
                ru: { title: "ДО ТОЯ ОСТАЛОСЬ:", d: "дн", h: "час", m: "мин", s: "сек", btn: "ПОДТВЕРДИТЬ ПРИСУТСТВИЕ", date: "14 ИЮНЯ, 16:00", addr: "Кургальжинское шоссе" },
                kz: { title: "ТОЙҒА ДЕЙІН ҚАЛДЫ:", d: "күн", h: "сағат", m: "мин", s: "сек", btn: "ҚАТЫСУЫҢЫЗДЫ РАСТАУ", date: "14 МАУСЫМ, 16:00", addr: "Қорғалжын тас жолы" }
            };
            document.getElementById('t-title').innerText = t[lang].title;
            document.getElementById('t-d').innerText = t[lang].d; document.getElementById('t-h').innerText = t[lang].h;
            document.getElementById('t-m').innerText = t[lang].m; document.getElementById('t-s').innerText = t[lang].s;
            document.getElementById('wa-text').innerText = t[lang].btn;
            document.getElementById('date-text').innerText = t[lang].date;
            document.getElementById('address-text').innerText = t[lang].addr;
        }
        const eventDate = new Date("June 14, 2026 16:00:00").getTime();
        setInterval(() => {
            const diff = eventDate - new Date().getTime();
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / 86400000);
                document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('mins').innerText = Math.floor((diff % 3600000) / 60000);
                document.getElementById('secs').innerText = Math.floor((diff % 60000) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
